<!doctype html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="style.css">
        <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
        <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
        <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
        <link rel="manifest" href="site.webmanifest">
        <title>Artis Vijups</title>
        <meta name="description" content="vijups.eu">
        <meta name="author" content="Artis Vijups">
    </head>
    <body>
        <script src="script.js" type="text/javascript"></script>
        <div class="placeholder" data-large="vita_vilcina.webp">
            <img src="vita_vilcina_small.webp" class="img-small" id="img-small" alt="Forest in Tīnūži (small)">
        </div>
        <div id="content">
            <video autoplay muted disableRemotePlayback>
                <source src="logo.webm" type="video/webm">
            </video>
            <a class="button" id="button" onclick="formDisplay()">
                <svg class="icon-arrow before">
                    <use xlink:href="#arrow"></use>
                </svg>
                <span class="label">Contact me</span>
                <svg class="icon-arrow after">
                    <use xlink:href="#arrow"></use>
                </svg>
            </a>
            <svg style="display: none;">
            <defs>
                <symbol id="arrow" viewBox="0 0 35 15">
                <title>Arrow</title>
                <path d="M27.172 5L25 2.828 27.828 0 34.9 7.071l-7.07 7.071L25 11.314 27.314 9H0V5h27.172z"/>
                </symbol>
            </defs>
            </svg>
        </div>
        <div id="form">
            <a onclick="formDisplay()" class="close"></a>
            <div id="formcontent">
                <p>Send an e-mail directly to <a href="mailto:artis.vijups@gmail.com">artis.vijups@gmail.com</a> or fill out the form:</p>
                <form id="contact-form" name="contact-form" action="https://formsubmit.co/artis.vijups@gmail.com" method="POST">
                    <label id="namelabel" for="name">Name</label>
                    <input type="text" id="name" name="name" autocomplete="off" placeholder="Your name...">
                    <label id="emaillabel" for="email">E-mail</label>
                    <input type="text" id="email" name="email" autocomplete="off" placeholder="Your e-mail address...">
                    <label id="messagelabel" for="message">Message</label>
                    <textarea id="message" name="message" autocomplete="off" placeholder="Write something..."></textarea>
                    <a class="button" id="formButton" onclick="validate()">
                        <svg class="icon-arrow before">
                            <use xlink:href="#arrow"></use>
                        </svg>
                        <span class="label">Send</span>
                        <svg class="icon-arrow after">
                            <use xlink:href="#arrow"></use>
                        </svg>
                    </a>
                </form>
            </div>
        </div>
    </body>
</html>
