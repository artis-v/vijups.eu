<!doctype html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="style.css">
        <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
        <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
        <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
        <link rel="manifest" href="site.webmanifest">
        <title>Artis Vijups</title>
        <meta name="description" content="vijups.eu">
        <meta name="author" content="Artis Vijups">
    </head>
    <body>
        <script src="script.js" type="text/javascript"></script>
        <div class="placeholder" data-large="vita_vilcina.webp">
            <img src="vita_vilcina_small.webp" class="img-small" id="img-small" alt="Forest in Tīnūži (small)">
        </div>
        <div id="content">
            <p>Thank you! Your message has been sent.</p>
            <p>A copy of the message has also been sent to the e-mail address you provided.</p>
            <a class="button" id="button" href="index.html" style="opacity:1;animation:0s ease-out 0s 1 buttonAnimation;">
                <svg class="icon-arrow before">
                    <use xlink:href="#arrow"></use>
                </svg>
                <span class="label">Go back</span>
                <svg class="icon-arrow after">
                    <use xlink:href="#arrow"></use>
                </svg>
            </a>
            <svg style="display: none;">
            <defs>
                <symbol id="arrow" viewBox="0 0 35 15">
                <title>Arrow</title>
                <path d="M27.172 5L25 2.828 27.828 0 34.9 7.071l-7.07 7.071L25 11.314 27.314 9H0V5h27.172z"/>
                </symbol>
            </defs>
            </svg>
        </div>
    </body>
</html>
